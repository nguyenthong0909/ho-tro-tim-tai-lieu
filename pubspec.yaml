name: tra_loi_atm_pwa_minimal
description: PWA tra cứu tài liệu kỹ thuật, không đăng nhập, dùng documents.csv nhúng sẵn.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/documents.csv
